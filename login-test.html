<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;max-width:400px;margin:80px auto;padding:20px}
input{display:block;width:100%;padding:10px;margin:10px 0;font-size:16px;border:1px solid #ccc;border-radius:6px;box-sizing:border-box}
button{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
button:disabled{opacity:.6}
#msg{margin-top:16px;padding:12px;border-radius:6px;font-size:14px;display:none}
.ok{background:#d1fae5;color:#065f46}
.err{background:#fee2e2;color:#991b1b}
</style>
</head>
<body>
<h2>Test connexion Supabase</h2>
<input type="email" id="email" placeholder="Email" value="rayannabli27@gmail.com">
<input type="password" id="pwd" placeholder="Mot de passe" value="Autopilot2025!">
<button id="btn" onclick="tester()">Se connecter</button>
<div id="msg"></div>

<script>
const SUPABASE_URL = 'https://ivtuheoyfgljujliscwf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2dHVoZW95ZmdsanVqbGlzY3dmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxODI2OTgsImV4cCI6MjA5Mzc1ODY5OH0.NP4V9qjM30qy8cNLf6dO02W_gbuztBqpty_jA8CsbI0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function show(text, ok) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = ok ? 'ok' : 'err';
  m.style.display = 'block';
}

async function tester() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pwd = document.getElementById('pwd').value;
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Connexion...';
  show('Tentative de connexion...', true);
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
    if (error) { show('❌ Auth échouée: ' + error.message, false); btn.disabled=false; btn.textContent='Se connecter'; return; }
    show('✅ Auth OK! User: ' + data.user.email + ' | ID: ' + data.user.id, true);
    const { data: profile, error: pErr } = await sb.from('profiles').select('role,nom').eq('auth_id', data.user.id).maybeSingle();
    if (pErr) { show('✅ Auth OK mais profil erreur: ' + pErr.message, false); return; }
    if (!profile) { show('✅ Auth OK mais aucun profil trouvé pour cet auth_id', false); return; }
    show('🎉 CONNEXION COMPLÈTE! Rôle: ' + profile.role + ' | Nom: ' + profile.nom, true);
  } catch(ex) {
    show('❌ Exception: ' + ex.message, false);
  }
  btn.disabled = false;
  btn.textContent = 'Se connecter';
}
</script>
</body>
</html>
